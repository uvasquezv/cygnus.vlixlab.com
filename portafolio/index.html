<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portafolio · Cygnus.vlix</title><meta name="description" content="Explora nuestro trabajo por categoría. Cada galería reúne sesiones reales editadas con el sello de Cygnus.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--gold:#C9A84C;--gold-light:#E8C97A;--gold-dark:#9A7A2E;--gold-grad:linear-gradient(135deg,#C9A84C 0%,#E8C97A 50%,#C9A84C 100%);--black:#000;--dark1:#0A0A0A;--dark2:#111;--border:rgba(201,168,76,0.2);--border-hover:rgba(201,168,76,0.5);--white:#FFF;--muted:rgba(255,255,255,0.45)}
*{margin:0;padding:0;box-sizing:border-box}html{scroll-behavior:smooth}
body{background:var(--black);color:var(--white);font-family:'Inter',sans-serif;overflow-x:hidden}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:var(--dark1)}::-webkit-scrollbar-thumb{background:var(--gold-dark)}
a{text-decoration:none}
nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:14px 48px;background:rgba(0,0,0,0.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--border)}
.nav-logo img{height:46px;display:block}
.nav-right{display:flex;align-items:center;gap:24px}
.nav-back{color:var(--muted);font-size:11px;font-weight:600;letter-spacing:2px;text-transform:uppercase;transition:color 0.2s}.nav-back:hover{color:var(--gold)}
.nav-cta{background:var(--gold-grad);color:var(--black);padding:10px 24px;border-radius:2px;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;transition:opacity 0.2s}.nav-cta:hover{opacity:0.85}
.ghead{position:relative;padding:160px 56px 50px;text-align:center;overflow:hidden}
.ghead-bg{position:absolute;inset:0;background:radial-gradient(ellipse at 50% 0%,#1a1200 0%,#000 65%);z-index:0}
.ghead-inner{position:relative;z-index:1;max-width:900px;margin:0 auto}
.ghead-label{font-size:10px;font-weight:700;letter-spacing:4px;text-transform:uppercase;color:var(--gold);margin-bottom:22px;display:inline-flex;align-items:center;gap:12px}
.ghead-label::before,.ghead-label::after{content:'';width:28px;height:1px;background:var(--gold)}
.ghead-title{font-family:'Rajdhani',sans-serif;text-transform:uppercase;line-height:1;margin-bottom:22px}
.ghead-title .kick{display:block;color:var(--white);font-weight:600;font-size:clamp(16px,2.4vw,28px);letter-spacing:0.12em;margin-bottom:6px}
.ghead-title .big{display:block;font-weight:700;font-size:clamp(40px,7vw,92px);line-height:0.95;background:var(--gold-grad);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;color:transparent}
.ghead-desc{font-size:15px;color:var(--muted);line-height:1.8;max-width:620px;margin:0 auto}
.land-wrap{max-width:1200px;margin:0 auto;padding:10px 40px 90px}
.serv-tabs{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:16px}
.serv-tab{background:var(--dark1);border:1px solid var(--border);border-radius:6px;padding:42px 34px;display:flex;flex-direction:column;align-items:flex-start;text-decoration:none;transition:transform 0.3s,border-color 0.3s,background 0.3s}
.serv-tab:hover{transform:translateY(-4px);border-color:var(--gold);background:var(--dark2)}
.serv-tab-ico{width:48px;height:48px;margin-bottom:22px}.serv-tab-ico svg{width:100%;height:100%;stroke:var(--gold);fill:none;stroke-width:1.4}
.serv-tab-name{font-family:'Rajdhani',sans-serif;font-size:24px;font-weight:700;text-transform:uppercase;color:#fff;letter-spacing:0.02em}
.serv-tab-go{margin-top:14px;font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--gold-dark);transition:color 0.3s}.serv-tab:hover .serv-tab-go{color:var(--gold)}
.portfolio-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:2px}
.pf-card{aspect-ratio:4/5;overflow:hidden;position:relative;display:block;text-decoration:none;background:var(--dark2)}
.pf-card img{width:100%;height:100%;object-fit:cover;transition:transform 0.7s ease}.pf-card:hover img{transform:scale(1.06)}
.pf-card-ov{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,0.85) 0%,rgba(0,0,0,0.1) 55%,transparent 100%);display:flex;flex-direction:column;justify-content:flex-end;padding:26px;transition:background 0.3s}
.pf-card:hover .pf-card-ov{background:linear-gradient(to top,rgba(0,0,0,0.92) 0%,rgba(0,0,0,0.25) 60%,rgba(0,0,0,0.05) 100%)}
.pf-card-name{font-family:'Rajdhani',sans-serif;font-size:24px;font-weight:700;text-transform:uppercase;color:#fff;line-height:1.05}
.pf-card-go{margin-top:8px;font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--gold-light);opacity:0;transform:translateY(6px);transition:opacity 0.3s,transform 0.3s}
.pf-card:hover .pf-card-go{opacity:1;transform:translateY(0)}
footer{background:var(--black);border-top:1px solid var(--border);padding:40px 56px}
.foot{max-width:1200px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:20px}
.foot-copy{font-size:12px;color:var(--muted);letter-spacing:1px}
.foot-links{display:flex;gap:28px}.foot-links a{color:var(--muted);font-size:11px;font-weight:600;letter-spacing:2px;text-transform:uppercase;transition:color 0.2s}.foot-links a:hover{color:var(--gold)}
@media(max-width:1024px){.portfolio-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:600px){nav{padding:12px 20px}.nav-logo img{height:38px}.nav-back{display:none}.ghead{padding:130px 22px 40px}.land-wrap{padding:6px 16px 70px}.portfolio-grid{grid-template-columns:1fr}.foot{flex-direction:column;text-align:center}.foot-links{justify-content:center}}
</style></head><body>
